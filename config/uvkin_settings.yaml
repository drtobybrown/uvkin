# uvkin pipeline settings — Optimized for KILOGAS DR1 (2026-03-27)
# ---------------------------------------------------------------------------
# Shared grid and CO J=2–1 rest frequency
# ---------------------------------------------------------------------------
shared:
  default_channel_width_kms: 1.2699254451290471
  cellsize_arcsec: 0.1   # Gold standard for 0.32 kpc resolution
  nx: 256
  ny: 256
  vel_buffer_kms: 100.0  # Vital for noise-floor (diagnostic) baseline
  f_rest_hz: 230538000000.0
  c_kms: 299792.458
  weight_scale_factor: 0.5  # Hanning smoothing covariance correction; 1.0 = no correction

# ---------------------------------------------------------------------------
# Galaxy catalog (values from kilogas/analysis/catalogues/kgas007_066_catalogue.csv
# unless otherwise noted).
#
# `pa_init` is stored as the RECEDING-side major-axis PA in standard
# East-of-North orientation (not just a photometric major-axis angle).
#
# `ra_deg`, `dec_deg` are the catalogue ICRS coordinates (NSA/MGE), used by
# run_kgas_full to cross-check the MS PHASE_DIR stored in the .npz and warn
# on separations > 1 arcsec.
# ---------------------------------------------------------------------------
galaxies:
  KGAS007:
    kilogas_archive_id: KILOGAS007
    # CANFAR default (submit_kgas.sh passes --data explicitly; local runs override with --data)
    data_path_default: /arc/projects/KILOGAS/analysis/toby_sandbox/visibilities/KILOGAS007.npz
    ra_deg: 146.576065         # catalogue
    dec_deg: 2.88434           # catalogue
    vsys: 14229.0              # cz from catalogue z=0.047463 (no VHI)
    vhi_kms: null              # not available in catalogue
    r_scale: 3.0               # approx. Re_R_arcsec=3.20
    # pa_init = KinMS posAng of redshifted tip (red side = SSE, so ~212.6 deg CW from N).
    pa_init: 212.6
    inc_init: 28.9             # acos(ba=0.8753) = 28.92 deg
    obs_freq_range_ghz: [219.999, 220.205]
    flux_int_jy_kms: 24.132    # Sco_deltaV (integrated Jy*km/s)
    # MS PHASE_DIR matches catalogue ra/decl to <1 mas; start MCMC dx,dy at origin.
    phase_centroid_seed_arcsec: [0.0, 0.0]

  KGAS066:
    kilogas_archive_id: KILOGAS066
    # CANFAR default (submit_kgas.sh passes --data explicitly; local runs override with --data)
    data_path_default: /arc/projects/KILOGAS/analysis/toby_sandbox/visibilities/KILOGAS066.npz
    ra_deg: 345.667969         # catalogue
    dec_deg: 13.32909          # catalogue
    vhi_kms: 8305.0
    r_scale: 3.0               # arcsec
    pa_init: 205.212
    inc_init: 51.690
    vsys: 8299.563
    flux_int_jy_kms: 160.055473
    # MS PHASE_DIR matches catalogue ra/decl to <1 mas; start MCMC dx,dy at origin.
    phase_centroid_seed_arcsec: [0.0, 0.0]

# ---------------------------------------------------------------------------
# Visibility aggregation
# ---------------------------------------------------------------------------
aggregation:
  # Reset to origin for default; specific galaxies use centroids above
  default_phase_centroid_seed_arcsec: [0.0, 0.0] 
  
  uv_bin_size_m: 10.0
  time_bin_s: 30.0
  apply_uv_binning: true
  apply_time_averaging: true
  
  # Boost SNR by sqrt(4) = 2x per channel
  spectral_bin_factor: 4 

# ---------------------------------------------------------------------------
# emcee / uvfit priors
# ---------------------------------------------------------------------------
mcmc_bounds:
  # Widened from ±50 km/s after catalogue audit: catalogue VHI / cz(z) seed
  # uncertainty can be several tens of km/s; ±200 covers both without the
  # wall-hugging failure mode observed on KGAS066/007.
  vsys_offset_kms: [-200.0, 200.0]
  gas_sigma: [3.0, 80.0]   # Upper raised so σ is not forced to a wall when geometry is off

  # Integrated flux S_int (Jy·km/s): MCMC flux box is [low×S_int, high×S_int]
  flux_multipliers: [0.05, 10.0]

  gamma: [0.0, 2.0]

  # inc: half-width 90° → full [0°, 90°] after clamp (prevents inc wall-hugging)
  inc_half_width_deg: 90.0
  pa_half_width_deg: 50.0   # Allow the gas to settle ±50 deg from stellar PA

  # Phase-centre (dx, dy) MCMC box around the seed in aggregation /
  # galaxies.phase_centroid_seed_arcsec. KinMSModel now fits these directly;
  # the pre-fit auto-centroid step has been removed.
  dx_half_width_arcsec: 5.0
  dy_half_width_arcsec: 5.0
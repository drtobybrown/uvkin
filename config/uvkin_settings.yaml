# uvkin pipeline settings — Optimized for KILOGAS DR1 (2026-03-27)
# ---------------------------------------------------------------------------
# Shared grid and CO J=2–1 rest frequency
# ---------------------------------------------------------------------------
shared:
  default_channel_width_kms: 1.2699254451290471
  cellsize_arcsec: 0.1   # Gold standard for 0.32 kpc resolution
  nx: 256
  ny: 256
  vel_buffer_kms: 100.0  # Vital for noise-floor (diagnostic) baseline
  f_rest_hz: 230538000000.0
  c_kms: 299792.458
  weight_scale_factor: 0.5  # Hanning smoothing covariance correction; 1.0 = no correction

# ---------------------------------------------------------------------------
# Galaxy catalog
# Seeds: pa_init is the KinMS `posAng` of the REDSHIFTED side, measured CW
# from North (0=N, 90=W, 180=S, 270=E). To convert a standard astronomical
# major-axis PA (East-of-North) with red side at +180 from it, use
#     pa_init = (360 - PA_astro_of_red_side) mod 360
# ---------------------------------------------------------------------------
galaxies:
  KGAS007:
    kilogas_archive_id: KILOGAS007
    # CANFAR default (submit_kgas.sh passes --data explicitly; local runs override with --data)
    data_path_default: /arc/projects/KILOGAS/analysis/toby_sandbox/visibilities/KILOGAS007.npz
    vsys: 13547.0         # Updated to Kinematic MAP center
    r_scale: 3.0
    # NSA photometric major-axis PA = 147.4 deg (East-of-North). Red side is
    # SSE, i.e. the 147.4 deg E-of-N end of the major axis. KinMS posAng is
    # CW from North (= -astro_PA mod 360), so posAng = 360 - 147.4 = 212.6 deg.
    pa_init: 212.6
    inc_init: 28.9
    obs_freq_range_ghz: [219.999, 220.205]
    flux_int_jy_kms: 24.132
    phase_centroid_seed_arcsec: [-0.087, 0.187] # Updated to best-fit centroid

  KGAS066:
    kilogas_archive_id: KILOGAS066
    # CANFAR default (submit_kgas.sh passes --data explicitly; local runs override with --data)
    data_path_default: /arc/projects/KILOGAS/analysis/toby_sandbox/visibilities/KILOGAS066.npz
    vsys: 8033.4          # Updated to Kinematic MAP center
    r_scale: 7.0
    # NSA photometric major-axis PA = 13.8 deg (East-of-North). Red side is SSW,
    # i.e. the 193.8 deg E-of-N end of the major axis. KinMS posAng is CW from
    # North (= -astro_PA mod 360), so posAng = 360 - 193.8 = 166.2 deg.
    pa_init: 166.2
    inc_init: 43.8
    obs_freq_range_ghz: [224.148, 224.506]
    flux_int_jy_kms: 102.482
    phase_centroid_seed_arcsec: [0.789, 1.415]  # Updated to best-fit centroid

# ---------------------------------------------------------------------------
# Visibility aggregation
# ---------------------------------------------------------------------------
aggregation:
  # Reset to origin for default; specific galaxies use centroids above
  default_phase_centroid_seed_arcsec: [0.0, 0.0] 
  
  uv_bin_size_m: 10.0
  time_bin_s: 30.0
  apply_uv_binning: true
  apply_time_averaging: true
  
  # Boost SNR by sqrt(4) = 2x per channel
  spectral_bin_factor: 4 

# ---------------------------------------------------------------------------
# emcee / uvfit priors
# ---------------------------------------------------------------------------
mcmc_bounds:
  vsys_offset_kms: [-50.0, 50.0]
  gas_sigma: [3.0, 50.0]   # Allow room for turbulent/noisy disks
  
  # Integrated flux S_int (Jy·km/s): MCMC flux box is [low×S_int, high×S_int]
  flux_multipliers: [0.2, 5.0]
  gamma: [0.0, 2.0]
  
  # Widened half-widths to prevent "boundary hugging"
  inc_half_width_deg: 30.0
  pa_half_width_deg: 50.0   # Allow the gas to settle ±50 deg from stellar PA

  # Phase-centre (dx, dy) MCMC box around the seed in aggregation /
  # galaxies.phase_centroid_seed_arcsec. KinMSModel now fits these directly;
  # the pre-fit auto-centroid step has been removed.
  dx_half_width_arcsec: 1.0
  dy_half_width_arcsec: 1.0
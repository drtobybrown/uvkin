name: uvkin
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.13
  - numpy>=1.24
  - pyyaml>=6.0
  - scipy>=1.10
  - matplotlib>=3.7
  - astropy>=5.3
  - spectral-cube>=0.6
  - python-casacore>=3.5
  - pyuvdata>=2.4
  - emcee>=3.1
  - jupyter
  - ipykernel
  - pip
  - pip:
    - pytest
    - kinms>=3.0
    - corner
    - tqdm
    - pymakeplots
    # The uvfit / ms2uvfit commits pinned below MUST expose the canonical
    # metres + Hz schema (UVDataset u_m/v_m + per-channel ν in NUFFTEngine,
    # UVFitData.save with u_m/v_m keys). Older commits are source-
    # incompatible (load_uvfits will refuse legacy u,v-wavelengths .npz).
    # Bump these pins to versioned tags once released upstream:
    #   - uvfit @ git+https://github.com/drtobybrown/uvfit.git@vX.Y.Z
    #   - ms2uvfit @ git+https://github.com/drtobybrown/ms2uvfit.git@vX.Y.Z
    - uvfit @ git+https://github.com/drtobybrown/uvfit.git
    - ms2uvfit @ git+https://github.com/drtobybrown/ms2uvfit.git

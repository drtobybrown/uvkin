name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Synthetic-only policy
# ----------------------
# Automated CI MUST NOT load real KILOGAS DR1 Measurement Sets or .npz
# files. All tests under tests/ build their inputs with numpy RNGs.
# The heavy KinMS integration test
# (tests/test_flux_integration_invariance.py) is gated with
# pytest.importorskip("uvfit") / pytest.importorskip("kinms"); it runs
# only when those dependencies are available.

jobs:
  test:
    name: Synthetic tests - ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('environment.yml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install minimal deps
        # Avoid casacore / pyuvdata / kinms — not needed for synthetic
        # tests. test_flux_integration_invariance will importorskip if
        # uvfit/kinms are missing, which they are here.
        run: |
          python -m pip install --upgrade pip
          pip install 'numpy>=1.24' 'pyyaml>=6.0' 'pytest>=7.0' 'astropy>=5.3'

      - name: Run synthetic tests
        run: pytest tests/ -v --tb=short
